<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦСОП "Леда Милева" - Генератор</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            #schedule-table { border: 1px solid black !important; width: 100% !important; }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE MOCK & CONSTANTS ---
        // За да работи файлът веднага локално, използваме вградено състояние.
        // Можете да добавите вашата Firebase инициализация тук, ако е необходимо.
        
        const DAYS = ['Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък'];
        const PERIODS = [1, 2, 3, 4, 5, 6, 7];
        const INITIAL_CLASSES = ['ПГ', 'I паралелка', 'II паралелка', 'III паралелка', 'IV паралелка'];
        const ACADEMIC_YEAR = "2025/2026 Учебна Година";

        const INITIAL_TEACHERS = [
            { id: '1', name: 'Калинка Илиева', constraints: [] },
            { id: '2', name: 'Галя Ненчева', constraints: [] },
            { id: '3', name: 'Петринка Нанова', constraints: [] },
            { id: '4', name: 'Цветанка Брайкова', constraints: [] },
            { id: '5', name: 'Огнян Йорданов', constraints: [] }
        ];

        // Икона компонент (Lucide-React адаптация за браузър)
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');
            const [term, setTerm] = useState('1');
            const [selectedClass, setSelectedClass] = useState(INITIAL_CLASSES[0]);
            const [data, setData] = useState({
                teachers: INITIAL_TEACHERS,
                subjects: ['БЕЛ', 'Математика', 'Музика', 'ИТ', 'ФВС'],
                classes: INITIAL_CLASSES,
                curriculum: { '1': {}, '2': {} },
                schedules: { '1': {}, '2': {} }
            });

            // Запазване в LocalStorage за локална работа
            useEffect(() => {
                const saved = localStorage.getItem('csop_data');
                if (saved) setData(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('csop_data', JSON.stringify(data));
            }, [data]);

            const generateSchedule = () => {
                const cur = data.curriculum[term]?.[selectedClass] || [];
                if (cur.length === 0) {
                    alert("Моля, първо въведете учебен план за тази паралелка!");
                    return;
                }

                let newSched = {};
                DAYS.forEach((_, i) => { newSched[i] = {}; });

                let tasks = [];
                cur.forEach(item => {
                    for (let i = 0; i < item.hours; i++) {
                        tasks.push({ sub: item.subject, tId: item.teacherId });
                    }
                });

                // Разбъркване на часовете
                tasks.sort(() => Math.random() - 0.5);

                tasks.forEach(task => {
                    let placed = false;
                    for (let dIdx = 0; dIdx < DAYS.length; dIdx++) {
                        for (let p of PERIODS) {
                            if (!newSched[dIdx][p]) {
                                newSched[dIdx][p] = task;
                                placed = true;
                                break;
                            }
                        }
                        if (placed) break;
                    }
                });

                setData(prev => ({
                    ...prev,
                    schedules: {
                        ...prev.schedules,
                        [term]: { ...prev.schedules[term], [selectedClass]: newSched }
                    }
                }));
            };

            const exportPDF = () => window.print();

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b-4 border-indigo-100 p-6 no-print shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl text-white">
                                    <Icon name="graduation-cap" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-lg font-black text-slate-800 uppercase leading-none">ЦСОП "Леда Милева"</h1>
                                    <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mt-1">{ACADEMIC_YEAR}</p>
                                </div>
                            </div>
                            
                            <nav className="flex bg-slate-100 p-1 rounded-xl">
                                {[
                                    {id:'schedule', label: 'График', icon: 'calendar'},
                                    {id:'curriculum', label: 'План', icon: 'book-open'},
                                    {id:'teachers', label: 'Персонал', icon: 'users'}
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-6 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}
                                    >
                                        <Icon name={tab.icon} size={14} /> {tab.label}
                                    </button>
                                ))}
                            </nav>

                            <select 
                                value={term} 
                                onChange={e => setTerm(e.target.value)}
                                className="bg-indigo-50 border-2 border-indigo-100 p-2 rounded-xl font-black text-xs text-indigo-700"
                            >
                                <option value="1">I СРОК</option>
                                <option value="2">II СРОК</option>
                            </select>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8">
                        {activeTab === 'schedule' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-end no-print">
                                    <div className="flex-1 w-full">
                                        <label className="text-[10px] font-black text-slate-400 uppercase mb-2 block">Паралелка:</label>
                                        <select 
                                            value={selectedClass} 
                                            onChange={e => setSelectedClass(e.target.value)}
                                            className="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl font-black"
                                        >
                                            {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={generateSchedule} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                                        <Icon name="refresh-cw" size={18} /> ГЕНЕРИРАЙ
                                    </button>
                                    <button onClick={exportPDF} className="bg-slate-800 text-white p-3 rounded-xl hover:bg-black transition-all">
                                        <Icon name="printer" size={20} />
                                    </button>
                                </div>

                                <div className="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-8 text-center border-b border-slate-50">
                                        <h2 className="text-xl font-black uppercase text-slate-800">Седмично Разписание</h2>
                                        <p className="text-indigo-500 font-bold uppercase text-xs">{selectedClass} • Срок {term}</p>
                                    </div>
                                    <div className="overflow-x-auto p-4">
                                        <table id="schedule-table" className="w-full border-collapse">
                                            <thead>
                                                <tr>
                                                    <th className="p-4 border-b-2 border-slate-100 text-[10px] font-black text-slate-400 uppercase">Час</th>
                                                    {DAYS.map(day => <th key={day} className="p-4 border-b-2 border-slate-100 text-xs font-black text-slate-700 uppercase">{day}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p} className="group">
                                                        <td className="p-4 text-center font-black text-slate-300 text-2xl border-r border-slate-50">{p}</td>
                                                        {DAYS.map((_, di) => {
                                                            const cell = data.schedules[term]?.[selectedClass]?.[di]?.[p];
                                                            const teacher = data.teachers.find(t => t.id === cell?.tId);
                                                            return (
                                                                <td key={di} className="p-2 border-r border-slate-50 h-24 align-top">
                                                                    {cell && (
                                                                        <div className="bg-indigo-50 border border-indigo-100 p-3 rounded-xl h-full flex flex-col justify-center text-center">
                                                                            <div className="text-indigo-900 font-black text-[11px] uppercase leading-tight">{cell.sub}</div>
                                                                            <div className="text-slate-400 font-bold text-[8px] uppercase mt-1">{teacher?.name}</div>
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'curriculum' && (
                            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                                <h2 className="text-xl font-black text-slate-800 uppercase mb-8">Учебен План - {selectedClass}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-slate-50 p-6 rounded-2xl">
                                    <div className="md:col-span-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Предмет</label>
                                        <select id="sub_in" className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold">
                                            {data.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div className="md:col-span-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Учител</label>
                                        <select id="tea_in" className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold">
                                            {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="md:col-span-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase block mb-1">Часове</label>
                                        <input id="hrs_in" type="number" defaultValue="1" className="w-full p-3 rounded-xl border-2 border-slate-200 font-bold text-center" />
                                    </div>
                                    <button 
                                        onClick={() => {
                                            const sub = document.getElementById('sub_in').value;
                                            const tea = document.getElementById('tea_in').value;
                                            const hrs = parseInt(document.getElementById('hrs_in').value);
                                            const current = data.curriculum[term]?.[selectedClass] || [];
                                            setData(prev => ({
                                                ...prev,
                                                curriculum: {
                                                    ...prev.curriculum,
                                                    [term]: {
                                                        ...prev.curriculum[term],
                                                        [selectedClass]: [...current, { id: Date.now().toString(), subject: sub, teacherId: tea, hours: hrs }]
                                                    }
                                                }
                                            }));
                                        }}
                                        className="bg-indigo-600 text-white rounded-xl font-black hover:bg-indigo-700"
                                    >Добави</button>
                                </div>

                                <div className="space-y-2">
                                    {(data.curriculum[term]?.[selectedClass] || []).map(item => (
                                        <div key={item.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                                            <div>
                                                <span className="font-black text-slate-700 uppercase mr-4">{item.subject}</span>
                                                <span className="text-xs text-slate-400">{data.teachers.find(t => t.id === item.teacherId)?.name}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black text-indigo-600">{item.hours} ч.</span>
                                                <button 
                                                    onClick={() => {
                                                        const filtered = data.curriculum[term][selectedClass].filter(i => i.id !== item.id);
                                                        setData(prev => ({ ...prev, curriculum: { ...prev.curriculum, [term]: { ...prev.curriculum[term], [selectedClass]: filtered } } }));
                                                    }}
                                                    className="text-rose-400 hover:text-rose-600"
                                                ><Icon name="trash-2" size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'teachers' && (
                            <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                                <h2 className="text-xl font-black text-slate-800 uppercase mb-8">Персонал</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {data.teachers.map(t => (
                                        <div key={t.id} className="p-4 border-2 border-slate-50 rounded-2xl bg-slate-50 flex justify-between items-center">
                                            <span className="font-bold text-slate-700">{t.name}</span>
                                            <Icon name="user" size={16} className="text-slate-300" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-8 text-center no-print">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">ЦСОП "Леда Милева" • {ACADEMIC_YEAR.substring(0,9)}</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

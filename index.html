<!DOCTYPE html>
<html lang="bg" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>ЦСОП "Леда Милева" - Система за Разписания</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .print-area { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F3F6FF]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DAYS = ['Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък'];
        const PERIODS = [1, 2, 3, 4, 5, 6, 7];

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');
            const [term, setTerm] = useState('1');
            const [selectedClass, setSelectedClass] = useState('');
            
            const [data, setData] = useState({
                teachers: [],
                subjects: [],
                classes: [],
                curriculum: { '1': {}, '2': {} },
                schedules: { '1': {}, '2': {} }
            });

            // Зареждане на данни
            useEffect(() => {
                const saved = localStorage.getItem('csop_master_data_v6');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setData(parsed);
                    if (parsed.classes.length > 0) setSelectedClass(parsed.classes[0]);
                } else {
                    // Начални данни при първо стартиране
                    const initial = {
                        teachers: [
                            { id: '1', name: 'Калинка Илиева', constraints: [] },
                            { id: '2', name: 'Галя Ненчева', constraints: [] }
                        ],
                        subjects: ['БЕЛ', 'Математика', 'Музика', 'ФВС'],
                        classes: ['I паралелка', 'II паралелка'],
                        curriculum: { '1': {}, '2': {} },
                        schedules: { '1': {}, '2': {} }
                    };
                    setData(initial);
                    setSelectedClass(initial.classes[0]);
                }
            }, []);

            // Автоматично записване
            useEffect(() => {
                if (data.teachers.length > 0) {
                    localStorage.setItem('csop_master_data_v6', JSON.stringify(data));
                }
            }, [data]);

            const copyCurriculumFromTerm1 = () => {
                if (term !== '2') return;
                const term1Plan = data.curriculum['1']?.[selectedClass] || [];
                if (term1Plan.length === 0) return alert("Няма данни в I срок за тази паралелка.");
                
                setData(prev => ({
                    ...prev,
                    curriculum: {
                        ...prev.curriculum,
                        '2': { ...prev.curriculum['2'], [selectedClass]: JSON.parse(JSON.stringify(term1Plan)) }
                    }
                }));
            };

            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                doc.text(`Разписание: ${selectedClass} (${term} срок)`, 14, 15);
                const tableData = PERIODS.map(p => {
                    const row = [p];
                    DAYS.forEach((_, di) => {
                        const cell = data.schedules[term]?.[selectedClass]?.[di]?.[p];
                        const t = data.teachers.find(it => it.id === cell?.tId);
                        row.push(cell ? `${cell.sub}\n(${t?.name})` : "-");
                    });
                    return row;
                });
                doc.autoTable({ head: [['Час', ...DAYS]], body: tableData, startY: 20 });
                doc.save(`Schedule_${selectedClass}.pdf`);
            };

            const exportWord = () => {
                let html = `<html><head><meta charset='utf-8'></head><body><h2>${selectedClass} - ${term} срок</h2><table border='1'><tr><th>Час</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}</tr>${PERIODS.map(p=>`<tr><td>${p}</td>${DAYS.map((_,di)=>{const cell=data.schedules[term]?.[selectedClass]?.[di]?.[p]; const t=data.teachers.find(it=>it.id===cell?.tId); return `<td>${cell?`${cell.sub}<br>${t?.name}`:''}</td>`}).join('')}</tr>`).join('')}</table></body></html>`;
                const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Schedule_${selectedClass}.doc`;
                link.click();
            };

            const generateSchedule = () => {
                const cur = data.curriculum[term]?.[selectedClass] || [];
                if (cur.length === 0) return alert("Първо въведете Учебен план!");

                let newSched = {};
                DAYS.forEach((_, i) => { newSched[i] = {}; });
                let tasks = [];
                cur.forEach(item => {
                    for (let i = 0; i < item.hours; i++) tasks.push({ sub: item.subject, tId: item.teacherId });
                });
                tasks.sort(() => Math.random() - 0.5);

                tasks.forEach(task => {
                    let placed = false;
                    const teacher = data.teachers.find(t => t.id === task.tId);
                    for (let dIdx = 0; dIdx < DAYS.length; dIdx++) {
                        for (let p of PERIODS) {
                            const isUnavailable = teacher?.constraints?.some(c => c.day === DAYS[dIdx] && c.hour === p);
                            if (!isUnavailable && !newSched[dIdx][p]) {
                                newSched[dIdx][p] = task;
                                placed = true;
                                break;
                            }
                        }
                        if (placed) break;
                    }
                });

                setData(prev => ({
                    ...prev,
                    schedules: { ...prev.schedules, [term]: { ...prev.schedules[term], [selectedClass]: newSched } }
                }));
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* ПО-ТЕСЕН ХЕДЪР */}
                    <header className="bg-white border-b border-slate-100 sticky top-0 z-50 no-print shadow-sm h-12">
                        <div className="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-1 rounded-lg text-white">
                                    <Icon name="layout" size={14} />
                                </div>
                                <h1 className="text-[10px] font-black text-slate-800 uppercase tracking-tighter hidden sm:block">ЦСОП "Леда Милева"</h1>
                            </div>

                            <nav className="flex bg-slate-100 p-0.5 rounded-lg">
                                {[
                                    { id: 'schedule', label: 'Разписание', icon: 'calendar' },
                                    { id: 'curriculum', label: 'Учебен План', icon: 'book-open' },
                                    { id: 'database', label: 'База', icon: 'database' }
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center gap-1.5 px-3 py-1 rounded-md text-[9px] font-black uppercase transition-all ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}
                                    >
                                        <Icon name={tab.icon} size={12} /> {tab.label}
                                    </button>
                                ))}
                            </nav>

                            <div className="flex items-center gap-2">
                                <select 
                                    value={term} 
                                    onChange={e => setTerm(e.target.value)}
                                    className="bg-indigo-50 text-indigo-700 font-black text-[9px] px-2 py-1 rounded-lg border border-indigo-100 uppercase"
                                >
                                    <option value="1">I СРОК</option>
                                    <option value="2">II СРОК</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4">
                        
                        {/* РАЗПИСАНИЕ */}
                        {activeTab === 'schedule' && (
                            <div className="space-y-4">
                                <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex flex-wrap items-center gap-4 no-print">
                                    <select 
                                        value={selectedClass} 
                                        onChange={e => setSelectedClass(e.target.value)}
                                        className="bg-slate-50 border-none p-2 rounded-lg font-bold text-slate-800 text-xs min-w-[150px]"
                                    >
                                        {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <button onClick={generateSchedule} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-black text-[10px] uppercase hover:bg-indigo-700 flex items-center gap-2">
                                        <Icon name="refresh-cw" size={12} /> Генерирай
                                    </button>
                                    <div className="flex bg-slate-100 p-1 rounded-lg gap-1 ml-auto">
                                        <button onClick={() => window.print()} className="p-1.5 hover:bg-white rounded text-slate-600"><Icon name="printer" size={14} /></button>
                                        <button onClick={exportPDF} className="p-1.5 hover:bg-white rounded text-rose-500"><Icon name="file-text" size={14} /></button>
                                        <button onClick={exportWord} className="p-1.5 hover:bg-white rounded text-blue-500"><Icon name="file-digit" size={14} /></button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden print-area">
                                    <div className="p-4 text-center border-b border-slate-50">
                                        <h2 className="text-lg font-black uppercase text-slate-800">{selectedClass}</h2>
                                        <p className="text-[8px] font-bold text-indigo-500 uppercase tracking-widest">{term} СРОК • 2025/2026</p>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50/50">
                                                    <th className="p-2 border-b border-slate-100 text-[8px] font-black text-slate-300 uppercase w-12">Час</th>
                                                    {DAYS.map(day => <th key={day} className="p-2 border-b border-slate-100 text-[8px] font-black text-slate-700 uppercase">{day}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {PERIODS.map(p => (
                                                    <tr key={p}>
                                                        <td className="p-2 text-center border-r border-slate-50 font-black text-slate-200 text-lg">{p}</td>
                                                        {DAYS.map((_, di) => {
                                                            const cell = data.schedules[term]?.[selectedClass]?.[di]?.[p];
                                                            const t = data.teachers.find(it => it.id === cell?.tId);
                                                            return (
                                                                <td key={di} className="p-1 border-r border-slate-50 h-20 align-top min-w-[120px]">
                                                                    {cell && (
                                                                        <div className="bg-indigo-50/40 border border-indigo-100 p-1.5 rounded-lg h-full flex flex-col justify-center text-center">
                                                                            <div className="text-indigo-900 font-black text-[9px] uppercase leading-tight">{cell.sub}</div>
                                                                            <div className="text-slate-400 font-bold text-[7px] uppercase truncate">{t?.name}</div>
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* УЧЕБЕН ПЛАН */}
                        {activeTab === 'curriculum' && (
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <h2 className="text-sm font-black text-slate-800 uppercase">Учебен План за:</h2>
                                        <select 
                                            value={selectedClass} 
                                            onChange={e => setSelectedClass(e.target.value)}
                                            className="bg-slate-50 border-none p-2 rounded-lg font-bold text-slate-800 text-xs"
                                        >
                                            {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    {term === '2' && (
                                        <button onClick={copyCurriculumFromTerm1} className="bg-amber-50 text-amber-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 border border-amber-100">
                                            <Icon name="copy" size={12} /> Копирай от I срок
                                        </button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-xl no-print">
                                    <select id="sub_in" className="p-2 rounded-lg border-none text-xs font-bold shadow-sm">
                                        {data.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                    <select id="tea_in" className="p-2 rounded-lg border-none text-xs font-bold shadow-sm">
                                        {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                    </select>
                                    <input id="hrs_in" type="number" defaultValue="1" className="p-2 rounded-lg border-none text-xs font-bold shadow-sm text-center" />
                                    <button 
                                        onClick={() => {
                                            const sub = document.getElementById('sub_in').value;
                                            const tea = document.getElementById('tea_in').value;
                                            const hrs = parseInt(document.getElementById('hrs_in').value);
                                            const current = data.curriculum[term]?.[selectedClass] || [];
                                            setData(prev => ({
                                                ...prev,
                                                curriculum: { ...prev.curriculum, [term]: { ...prev.curriculum[term], [selectedClass]: [...current, { id: Date.now().toString(), subject: sub, teacherId: tea, hours: hrs }] } }
                                            }));
                                        }}
                                        className="bg-indigo-600 text-white p-2 rounded-lg font-black text-[9px] uppercase"
                                    >Добави</button>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                                    {(data.curriculum[term]?.[selectedClass] || []).map(item => (
                                        <div key={item.id} className="p-2 bg-white border border-slate-100 rounded-lg flex items-center justify-between shadow-sm">
                                            <div className="flex items-center gap-2">
                                                <div className="bg-indigo-600 text-white w-6 h-6 rounded flex items-center justify-center font-black text-[10px]">{item.hours}</div>
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-700 uppercase leading-none">{item.subject}</p>
                                                    <p className="text-[7px] font-bold text-slate-400 uppercase">{data.teachers.find(t => t.id === item.teacherId)?.name}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => {
                                                const filtered = data.curriculum[term][selectedClass].filter(i => i.id !== item.id);
                                                setData(prev => ({ ...prev, curriculum: { ...prev.curriculum, [term]: { ...prev.curriculum[term], [selectedClass]: filtered } } }));
                                            }} className="text-slate-200 hover:text-rose-500"><Icon name="trash-2" size={14} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* БАЗА ДАННИ */}
                        {activeTab === 'database' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 uppercase text-[10px] mb-4">Учители и Условия</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input id="new_tea" className="flex-1 p-2 bg-slate-50 rounded-lg text-xs font-bold border-none shadow-inner" placeholder="Име на учител..." />
                                        <button onClick={() => {
                                            const n = document.getElementById('new_tea').value;
                                            if(n) setData(prev => ({ ...prev, teachers: [...prev.teachers, { id: Date.now().toString(), name: n, constraints: [] }] }));
                                            document.getElementById('new_tea').value = "";
                                        }} className="bg-indigo-600 text-white px-3 rounded-lg font-black text-[9px] uppercase">Добави</button>
                                    </div>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2 scroll-hide">
                                        {data.teachers.map(t => (
                                            <div key={t.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="font-black text-slate-700 text-xs uppercase">{t.name}</span>
                                                    <button onClick={() => setData(prev => ({ ...prev, teachers: prev.teachers.filter(it => it.id !== t.id) }))} className="text-rose-400 hover:text-rose-600"><Icon name="trash-2" size={12} /></button>
                                                </div>
                                                <div className="grid grid-cols-5 gap-1">
                                                    {DAYS.map(d => (
                                                        <div key={d} className="space-y-1">
                                                            <span className="text-[7px] font-black text-slate-400 uppercase text-center block">{d.substring(0, 2)}</span>
                                                            <div className="flex flex-wrap gap-0.5 justify-center">
                                                                {PERIODS.map(p => {
                                                                    const isCon = t.constraints?.some(c => c.day === d && c.hour === p);
                                                                    return (
                                                                        <button 
                                                                            key={p} 
                                                                            onClick={() => {
                                                                                const newCons = isCon 
                                                                                    ? t.constraints.filter(c => !(c.day === d && c.hour === p))
                                                                                    : [...(t.constraints || []), { day: d, hour: p }];
                                                                                setData(prev => ({
                                                                                    ...prev,
                                                                                    teachers: prev.teachers.map(it => it.id === t.id ? { ...it, constraints: newCons } : it)
                                                                                }));
                                                                            }}
                                                                            className={`w-4 h-4 rounded text-[8px] font-bold ${isCon ? 'bg-rose-500 text-white' : 'bg-white text-slate-300 border border-slate-200'}`}
                                                                        >{p}</button>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-slate-800 uppercase text-[10px] mb-4">Предмети</h3>
                                        <div className="flex gap-2 mb-4">
                                            <input id="new_sub" className="flex-1 p-2 bg-slate-50 rounded-lg text-xs font-bold border-none shadow-inner" placeholder="Нов предмет..." />
                                            <button onClick={() => {
                                                const n = document.getElementById('new_sub').value;
                                                if(n) setData(prev => ({ ...prev, subjects: [...prev.subjects, n] }));
                                                document.getElementById('new_sub').value = "";
                                            }} className="bg-indigo-600 text-white px-3 rounded-lg font-black text-[9px] uppercase">Добави</button>
                                        </div>
                                        <div className="flex flex-wrap gap-1.5">
                                            {data.subjects.map(s => (
                                                <span key={s} className="px-2 py-1 bg-indigo-50 text-indigo-700 text-[9px] font-black rounded-md flex items-center gap-2 uppercase">
                                                    {s} <button onClick={() => setData(prev => ({ ...prev, subjects: prev.subjects.filter(it => it !== s) }))}><Icon name="x" size={10} /></button>
                                                </span>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                        <h3 className="font-black text-slate-800 uppercase text-[10px] mb-4">Паралелки</h3>
                                        <div className="flex gap-2 mb-4">
                                            <input id="new_cla" className="flex-1 p-2 bg-slate-50 rounded-lg text-xs font-bold border-none shadow-inner" placeholder="Нова паралелка..." />
                                            <button onClick={() => {
                                                const n = document.getElementById('new_cla').value;
                                                if(n) setData(prev => ({ ...prev, classes: [...prev.classes, n] }));
                                                document.getElementById('new_cla').value = "";
                                            }} className="bg-indigo-600 text-white px-3 rounded-lg font-black text-[9px] uppercase">Добави</button>
                                        </div>
                                        <div className="flex flex-wrap gap-1.5">
                                            {data.classes.map(c => (
                                                <span key={c} className="px-2 py-1 bg-slate-100 text-slate-600 text-[9px] font-black rounded-md flex items-center gap-2 uppercase">
                                                    {c} <button onClick={() => setData(prev => ({ ...prev, classes: prev.classes.filter(it => it !== c) }))}><Icon name="x" size={10} /></button>
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-4 text-center text-[7px] font-black text-slate-300 uppercase tracking-widest no-print">
                        Генератор на Разписания • ЦСОП "Леда Милева" • v6.0
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

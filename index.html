<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор на Разписания - ЦСОП "Леда Милева"</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Използваме директно SVG икони за пълна стабилност -->
    <!-- Firebase SDKs (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Потребителски икони чрез SVG за избягване на проблеми с външни библиотеки
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                graduation: <path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c3 3 9 3 12 0v-5" />,
                calendar: <rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><path d="M16 2v4M8 2v4M3 10h18" />,
                refresh: <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.27L21 8M21 3v5h-5" />,
                clock: <circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDWXdHvh1AHGNHElup-3-Kukaadz8uSGWg",
            authDomain: "generator-razpisanie.firebaseapp.com",
            databaseURL: "https://generator-razpisanie-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "generator-razpisanie",
            storageBucket: "generator-razpisanie.firebasestorage.app",
            messagingSenderId: "756529315524",
            appId: "1:756529315524:web:faa5e91bdd62c2e05ed391",
            measurementId: "G-ZRRXFYTKM1"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "csop-leda-mileva-main";

        const INITIAL_TEACHERS = [
            { id: '1', name: 'Калинка Илиева' }, { id: '2', name: 'Галя Ненчева' },
            { id: '3', name: 'Петринка Нанова' }, { id: '4', name: 'Цветанка Брайкова' },
            { id: '5', name: 'Огнян Йорданов' }, { id: '6', name: 'Атанас Атанасов' },
            { id: '7', name: 'Цветанка Михайлова' }, { id: '8', name: 'Петя Миланова' },
            { id: '9', name: 'Тони Иванов' }, { id: '10', name: 'Валентин Кръстев' },
            { id: '11', name: 'Таня Петкова' }, { id: '12', name: 'Габриела Мандалева' },
            { id: '13', name: 'Гергана Ненова' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [authError, setAuthError] = useState(false);
            const [activeTab, setActiveTab] = useState('schedule');
            const [data, setData] = useState({
                teachers: INITIAL_TEACHERS,
                classes: ['ПГ', 'I паралелка', 'II паралелка', 'III паралелка', 'IV паралелка'],
                subjects: ['БЕЛ', 'Математика', 'ФВС', 'Музика', 'ИТ', 'РКН'],
                curriculum: { '1': {} },
                schedules: { '1': {} }
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (e) {
                        console.error("Auth error:", e);
                        setAuthError(true);
                    }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('master_data');
                const unsub = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setData(doc.data());
                    } else {
                        docRef.set(data);
                    }
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });
                return () => unsub();
            }, [user]);

            if (authError) return (
                <div className="h-screen flex items-center justify-center bg-white flex-col gap-4 p-6 text-center">
                    <div className="bg-red-50 text-red-500 p-6 rounded-3xl max-w-md">
                        <h2 className="font-black mb-2 uppercase">Грешка в оторизацията</h2>
                        <p className="text-sm font-medium">Моля, активирайте "Anonymous" входа във Вашия Firebase проект (Authentication -> Sign-in method).</p>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white flex-col gap-4">
                    <Icon name="refresh" className="animate-spin text-indigo-600" size={40}/>
                    <p className="font-black text-slate-400 uppercase tracking-widest text-center px-4">Свързване с облака...</p>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="bg-white p-6 rounded-[32px] shadow-sm flex flex-col md:flex-row justify-between items-center mb-8 border border-slate-100">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg shadow-indigo-100">
                                <Icon name="graduation" />
                            </div>
                            <div>
                                <h1 className="font-black uppercase text-slate-800 tracking-tight leading-none mb-1">ЦСОП "Леда Милева"</h1>
                                <div className="flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${syncing ? 'bg-amber-400 animate-ping' : 'bg-emerald-500'}`}></span>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Облак: {syncing ? 'Запис...' : 'Активен'}</span>
                                </div>
                            </div>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl mt-4 md:mt-0">
                            {['schedule', 'curriculum', 'teachers'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-6 py-2 rounded-xl text-xs font-black transition-all ${activeTab === t ? 'bg-white shadow text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {t === 'schedule' ? 'ГРАФИК' : t === 'curriculum' ? 'ПЛАН' : 'УЧИТЕЛИ'}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-[40px] border shadow-sm p-8 md:p-12 text-center">
                                <Icon name="calendar" size={64} className="mx-auto text-slate-100 mb-6"/>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 uppercase mb-2">Готово за работа</h2>
                                <p className="text-slate-400 max-w-md mx-auto mb-8 font-medium text-sm">Приложението е свързано с проекта "generator-razpisanie".</p>
                                <button className="bg-indigo-600 text-white px-8 md:px-10 py-4 rounded-2xl font-black shadow-xl shadow-indigo-100 hover:scale-105 transition-transform uppercase text-sm">Генерирай разписание</button>
                            </div>
                        )}

                        {activeTab === 'teachers' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {data.teachers.map(t => (
                                    <div key={t.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center hover:border-indigo-200 transition-all shadow-sm">
                                        <div className="font-black text-slate-700 uppercase text-xs tracking-tight">{t.name}</div>
                                        <Icon name="clock" className="text-slate-300" size={16} />
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-12 text-center">
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">ЦСОП "Леда Милева" v1.0</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦСОП "Леда Милева" - Система за Разписания</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8faff; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        @media print { .no-print { display: none !important; } body { background: white; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Експортираме функциите към window, за да са достъпни в Babel скрипта
        window.FB_SDK = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, collection 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('schedule');
            const [term, setTerm] = useState('1');
            const [selectedClass, setSelectedClass] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [data, setData] = useState({
                teachers: [],
                subjects: [],
                classes: [],
                curriculum: { '1': {}, '2': {} },
                schedules: { '1': {}, '2': {} }
            });

            // Форми
            const [newTeacher, setNewTeacher] = useState('');
            const [newSubject, setNewSubject] = useState('');
            const [newClass, setNewClass] = useState('');
            const [curForm, setCurForm] = useState({ teacherId: '', subject: '', hours: 1 });

            // 1. Инициализация и Аутентикация
            useEffect(() => {
                const initFirebase = async () => {
                    // Изчакваме зареждането на SDK
                    if (!window.FB_SDK) {
                        setTimeout(initFirebase, 100);
                        return;
                    }

                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.FB_SDK;
                    const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);

                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setReady(true);
                    });
                };

                initFirebase();
            }, []);

            // 2. Слушател за данни в реално време (само след Login)
            useEffect(() => {
                if (!user || !window.FB_SDK) return;

                const { getFirestore, doc, onSnapshot } = window.FB_SDK;
                const db = getFirestore();
                const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
                
                // Четен брой сегменти: artifacts/id/public/data/settings/master_config
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'master_config');
                
                const unsubscribe = onSnapshot(docRef, 
                    (docSnap) => {
                        if (docSnap.exists()) {
                            const cloudData = docSnap.data();
                            setData(prev => ({
                                ...prev,
                                ...cloudData,
                                curriculum: cloudData.curriculum || { '1': {}, '2': {} },
                                schedules: cloudData.schedules || { '1': {}, '2': {} }
                            }));
                        }
                    },
                    (error) => console.error("Firestore Listen Error:", error)
                );

                return () => unsubscribe();
            }, [user]);

            // 3. Функция за запис
            const saveToCloud = async (newData) => {
                if (!user || !window.FB_SDK) return;
                
                const { getFirestore, doc, setDoc } = window.FB_SDK;
                const db = getFirestore();
                const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
                
                setIsSyncing(true);
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'master_config');
                    await setDoc(docRef, newData);
                } catch (e) {
                    console.error("Save failed:", e);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleUpdate = (updates) => {
                const updated = { ...data, ...updates };
                setData(updated);
                saveToCloud(updated);
            };

            // Логика за добавяне
            const addTeacher = () => {
                if (!newTeacher.trim()) return;
                handleUpdate({ teachers: [...data.teachers, { id: Date.now().toString(), name: newTeacher }] });
                setNewTeacher('');
            };

            const addSubject = () => {
                if (!newSubject.trim()) return;
                handleUpdate({ subjects: [...data.subjects, newSubject] });
                setNewSubject('');
            };

            const addClass = () => {
                if (!newClass.trim()) return;
                handleUpdate({ classes: [...data.classes, newClass] });
                setNewClass('');
            };

            const addToCurriculum = () => {
                if (!selectedClass || !curForm.teacherId || !curForm.subject) return;
                const newCur = JSON.parse(JSON.stringify(data.curriculum));
                if (!newCur[term][selectedClass]) newCur[term][selectedClass] = [];
                newCur[term][selectedClass].push({ ...curForm, id: Date.now().toString() });
                handleUpdate({ curriculum: newCur });
            };

            const generateSchedule = () => {
                const plan = data.curriculum[term]?.[selectedClass] || [];
                if (plan.length === 0) return;

                let newSched = {};
                [0,1,2,3,4].forEach(d => { newSched[d] = {}; });

                let tasks = [];
                plan.forEach(item => {
                    for(let i=0; i<item.hours; i++) tasks.push({ sub: item.subject, tId: item.teacherId });
                });
                
                // Shuffle
                tasks.sort(() => Math.random() - 0.5);

                tasks.forEach(task => {
                    let placed = false;
                    for(let d=0; d<5; d++) {
                        for(let h=1; h<=7; h++) {
                            if (!newSched[d][h]) {
                                newSched[d][h] = task;
                                placed = true; break;
                            }
                        }
                        if (placed) break;
                    }
                });

                const newSchedules = JSON.parse(JSON.stringify(data.schedules));
                newSchedules[term][selectedClass] = newSched;
                handleUpdate({ schedules: newSchedules });
            };

            if (!ready) return <div className="h-screen flex items-center justify-center font-black text-indigo-500 animate-pulse uppercase tracking-[0.3em]">Свързване с облака...</div>;

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white p-4 shadow-sm flex items-center justify-between no-print sticky top-0 z-50 border-b border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100">Ц</div>
                            <div>
                                <h1 className="text-[12px] font-black text-slate-800 uppercase leading-none tracking-tight">ЦСОП "Леда Милева"</h1>
                                <p className="text-[9px] font-bold text-indigo-400 mt-1 uppercase tracking-tighter">Синхронизирана Система</p>
                            </div>
                        </div>

                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                            {['schedule', 'curriculum', 'database'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} 
                                    className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {t === 'schedule' ? 'График' : t === 'curriculum' ? 'План' : 'База'}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-3">
                            <div className={`w-3 h-3 rounded-full ${isSyncing ? 'bg-amber-400 animate-pulse' : 'bg-green-500'}`} title={isSyncing ? "Записване..." : "Облакът е актуален"}></div>
                            <select value={term} onChange={e => setTerm(e.target.value)} className="bg-indigo-50 text-indigo-700 font-black text-[10px] px-4 py-2 rounded-xl border-none outline-none appearance-none cursor-pointer">
                                <option value="1">I СРОК</option>
                                <option value="2">II СРОК</option>
                            </select>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6">
                        {activeTab === 'schedule' && (
                            <div className="space-y-6">
                                <div className="glass-card p-6 rounded-[2rem] flex items-end gap-4 no-print shadow-xl shadow-indigo-100/10">
                                    <div className="flex-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-2 mb-2 block">Паралелка</label>
                                        <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-800 outline-none border border-transparent focus:border-indigo-100">
                                            <option value="">-- Изберете паралелка --</option>
                                            {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={generateSchedule} disabled={!selectedClass} className="h-14 px-8 bg-indigo-600 text-white rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-indigo-200 hover:bg-indigo-700 disabled:opacity-50 transition-all">Генерирай</button>
                                    <button onClick={() => window.print()} className="h-14 w-14 flex items-center justify-center bg-slate-800 text-white rounded-2xl shadow-lg hover:bg-slate-900 transition-all">🖨️</button>
                                </div>

                                {selectedClass && (
                                    <div className="bg-white rounded-[3rem] shadow-2xl shadow-indigo-100/30 overflow-hidden border border-slate-100">
                                        <div className="p-10 text-center bg-indigo-50/20 border-b border-indigo-50">
                                            <h2 className="text-3xl font-black text-slate-800 uppercase tracking-tight">{selectedClass}</h2>
                                            <p className="text-[10px] font-black text-indigo-500 uppercase tracking-[0.4em] mt-3">Седмично Разписание</p>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full border-collapse">
                                                <thead>
                                                    <tr className="bg-slate-50/50">
                                                        <th className="p-4 border-b text-[10px] font-black text-slate-300 uppercase">№</th>
                                                        {['Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък'].map(d => (
                                                            <th key={d} className="p-6 border-b text-[10px] font-black text-slate-600 uppercase tracking-widest">{d}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {[1,2,3,4,5,6,7].map(h => (
                                                        <tr key={h} className="border-b border-slate-50 last:border-0">
                                                            <td className="p-8 text-center font-black text-slate-200 text-3xl">{h}</td>
                                                            {[0,1,2,3,4].map(di => {
                                                                const cell = data.schedules[term]?.[selectedClass]?.[di]?.[h];
                                                                const teacher = data.teachers.find(t => t.id === cell?.tId);
                                                                return (
                                                                    <td key={di} className="p-2 min-w-[160px] h-32">
                                                                        {cell && (
                                                                            <div className="bg-white border border-indigo-50 p-4 rounded-3xl h-full flex flex-col justify-center text-center shadow-sm hover:border-indigo-200 transition-all scale-100 hover:scale-[1.02]">
                                                                                <p className="text-slate-800 font-black text-[11px] uppercase leading-tight">{cell.sub}</p>
                                                                                <p className="text-indigo-400 font-bold text-[8px] uppercase mt-3 tracking-wider">{teacher?.name || '---'}</p>
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'curriculum' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <div className="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-indigo-100/20">
                                    <h3 className="text-sm font-black uppercase text-indigo-600 mb-8 tracking-widest flex items-center gap-3">План за обучение</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="md:col-span-2">
                                            <label className="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-2">Паралелка</label>
                                            <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-800 outline-none">
                                                <option value="">-- Избор --</option>
                                                {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-2">Учител</label>
                                            <select value={curForm.teacherId} onChange={e => setCurForm({...curForm, teacherId: e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-800 outline-none">
                                                <option value="">-- Избор --</option>
                                                {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-2">Предмет</label>
                                            <select value={curForm.subject} onChange={e => setCurForm({...curForm, subject: e.target.value})} className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-800 outline-none">
                                                <option value="">-- Избор --</option>
                                                {data.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-2 flex items-end gap-4">
                                            <div className="flex-1">
                                                <label className="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-2">Часове седмично</label>
                                                <input type="number" value={curForm.hours} onChange={e => setCurForm({...curForm, hours: parseInt(e.target.value)})} className="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-800 outline-none" />
                                            </div>
                                            <button onClick={addToCurriculum} className="bg-indigo-600 text-white px-10 h-[56px] rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-indigo-100 hover:bg-indigo-700">Добави</button>
                                        </div>
                                    </div>
                                </div>
                                
                                {selectedClass && (
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-lg">
                                        <h4 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest italic">Текущ списък</h4>
                                        <div className="space-y-2">
                                            {(data.curriculum[term]?.[selectedClass] || []).map((item, idx) => (
                                                <div key={item.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-transparent hover:border-indigo-100 transition-all">
                                                    <div>
                                                        <p className="font-black text-slate-800 text-xs uppercase">{item.subject}</p>
                                                        <p className="text-[10px] font-bold text-indigo-500 uppercase mt-1">
                                                            {data.teachers.find(t => t.id === item.teacherId)?.name} • {item.hours} ч.
                                                        </p>
                                                    </div>
                                                    <button onClick={() => {
                                                        const newCur = JSON.parse(JSON.stringify(data.curriculum));
                                                        newCur[term][selectedClass].splice(idx, 1);
                                                        handleUpdate({ curriculum: newCur });
                                                    }} className="text-slate-300 hover:text-red-500 font-black text-xl px-2">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'database' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="glass-card p-6 rounded-[2.5rem] flex flex-col h-[600px] shadow-xl shadow-slate-200/50">
                                    <h3 className="font-black uppercase text-indigo-600 text-[10px] mb-6 tracking-widest">Учители</h3>
                                    <div className="flex gap-2 mb-6">
                                        <input value={newTeacher} onChange={e => setNewTeacher(e.target.value)} placeholder="Име..." className="flex-1 bg-slate-50 p-4 rounded-2xl text-xs font-bold outline-none" />
                                        <button onClick={addTeacher} className="w-14 h-14 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100">+</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                        {data.teachers.map(t => (
                                            <div key={t.id} className="p-4 bg-slate-50 rounded-2xl flex items-center justify-between group border border-transparent hover:border-indigo-50 transition-all">
                                                <span className="text-xs font-bold text-slate-700">{t.name}</span>
                                                <button onClick={() => handleUpdate({ teachers: data.teachers.filter(x => x.id !== t.id) })} className="text-slate-300 opacity-0 group-hover:opacity-100 hover:text-red-500 transition-all font-black">×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-6 rounded-[2.5rem] flex flex-col h-[600px] shadow-xl shadow-slate-200/50">
                                    <h3 className="font-black uppercase text-indigo-600 text-[10px] mb-6 tracking-widest">Предмети</h3>
                                    <div className="flex gap-2 mb-6">
                                        <input value={newSubject} onChange={e => setNewSubject(e.target.value)} placeholder="Предмет..." className="flex-1 bg-slate-50 p-4 rounded-2xl text-xs font-bold outline-none" />
                                        <button onClick={addSubject} className="w-14 h-14 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100">+</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                        {data.subjects.map((s, i) => (
                                            <div key={i} className="p-4 bg-slate-50 rounded-2xl flex items-center justify-between group border border-transparent hover:border-indigo-50 transition-all">
                                                <span className="text-xs font-bold text-slate-700">{s}</span>
                                                <button onClick={() => handleUpdate({ subjects: data.subjects.filter((_, idx) => idx !== i) })} className="text-slate-300 opacity-0 group-hover:opacity-100 hover:text-red-500 transition-all font-black">×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-6 rounded-[2.5rem] flex flex-col h-[600px] shadow-xl shadow-slate-200/50">
                                    <h3 className="font-black uppercase text-indigo-600 text-[10px] mb-6 tracking-widest">Паралелки</h3>
                                    <div className="flex gap-2 mb-6">
                                        <input value={newClass} onChange={e => setNewClass(e.target.value)} placeholder="Име..." className="flex-1 bg-slate-50 p-4 rounded-2xl text-xs font-bold outline-none" />
                                        <button onClick={addClass} className="w-14 h-14 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100">+</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                        {data.classes.map((c, i) => (
                                            <div key={i} className="p-4 bg-slate-50 rounded-2xl flex items-center justify-between group border border-transparent hover:border-indigo-50 transition-all">
                                                <span className="text-xs font-bold text-slate-700">{c}</span>
                                                <button onClick={() => handleUpdate({ classes: data.classes.filter((_, idx) => idx !== i) })} className="text-slate-300 opacity-0 group-hover:opacity-100 hover:text-red-500 transition-all font-black">×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full p-4 text-center text-[7px] font-black text-slate-300 uppercase tracking-[0.8em] no-print pointer-events-none bg-white/50 backdrop-blur-sm">
                        Система за управление на учебния процес • 2026
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

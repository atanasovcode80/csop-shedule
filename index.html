<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор на разписание - ЦСОП "Леда Милева"</title>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100%; margin: 0; padding: 0; box-shadow: none; border: none; }
            @page { margin: 1cm; size: landscape; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // 1. Firebase Imports (Modular SDK v11)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        
        // Expose to window for React to use
        window.FB_SDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration (Вашите ключове)
        const firebaseConfig = {
            apiKey: "AIzaSyDWXdHvh1AHGNHElup-3-Kukaadz8uSGWg",
            authDomain: "generator-razpisanie.firebaseapp.com",
            databaseURL: "https://generator-razpisanie-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "generator-razpisanie",
            storageBucket: "generator-razpisanie.firebasestorage.app",
            messagingSenderId: "756529315524",
            appId: "1:756529315524:web:faa5e91bdd62c2e05ed391"
        };
        const APP_ID = "csop-leda-mileva-prod";

        function App() {
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('curriculum'); // Default tab
            const [term, setTerm] = useState('1'); // 1 or 2
            
            // Основен стейт за данните
            const [data, setData] = useState({
                classes: [],
                teachers: [],
                subjects: [],
                curriculum: { '1': {}, '2': {} }, // structure: { term: { classId: [ {id, sub, tId, hours} ] } }
                schedules: { '1': {}, '2': {} },  // structure: { term: { classId: { day: { hour: { sub, tId } } } } }
                customConditions: ""
            });

            // Локални стейтове за форми
            const [selectedClass, setSelectedClass] = useState('');
            const [curForm, setCurForm] = useState({ tId: '', sub: '', hours: 1 });
            const [newTeacher, setNewTeacher] = useState('');
            const [newSubject, setNewSubject] = useState('');
            const [newClass, setNewClass] = useState('');
            const [toastMessage, setToastMessage] = useState('');

            // --- 1. FIREBASE INITIALIZATION & SYNC ---
            useEffect(() => {
                const initFirebase = async () => {
                    if (!window.FB_SDK) {
                        setTimeout(initFirebase, 100);
                        return;
                    }
                    try {
                        const app = window.FB_SDK.initializeApp(firebaseConfig);
                        const auth = window.FB_SDK.getAuth(app);
                        const db = window.FB_SDK.getFirestore(app);
                        
                        // Вход в системата (анонимен за лесен достъп)
                        await window.FB_SDK.signInAnonymously(auth);
                        
                        window.FB_SDK.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                // Слушане за промени в реално време (Real-time sync)
                                const docRef = window.FB_SDK.doc(db, 'artifacts', APP_ID, 'public', 'data', 'school', 'master');
                                window.FB_SDK.onSnapshot(docRef, (snap) => {
                                    if (snap.exists()) {
                                        // Merge със съществуващия стейт, за да не гърми ако липсва нещо
                                        const dbData = snap.data();
                                        setData(prev => ({
                                            classes: dbData.classes || [],
                                            teachers: dbData.teachers || [],
                                            subjects: dbData.subjects || [],
                                            curriculum: dbData.curriculum || { '1': {}, '2': {} },
                                            schedules: dbData.schedules || { '1': {}, '2': {} },
                                            customConditions: dbData.customConditions || ""
                                        }));
                                    }
                                    setReady(true);
                                }, (error) => {
                                    console.error("Грешка при четене от Firebase:", error);
                                    showToast("Проблем с връзката към базата данни!");
                                    setReady(true);
                                });
                            }
                        });
                    } catch (error) {
                        console.error("Firebase Init Error:", error);
                    }
                };
                initFirebase();
            }, []);

            // Функция за запазване на данните във Firebase
            const saveData = async (updatedData) => {
                if (!user || !window.FB_SDK) return;
                try {
                    const app = window.FB_SDK.initializeApp(firebaseConfig);
                    const db = window.FB_SDK.getFirestore(app);
                    const docRef = window.FB_SDK.doc(db, 'artifacts', APP_ID, 'public', 'data', 'school', 'master');
                    await window.FB_SDK.setDoc(docRef, updatedData);
                    setData(updatedData);
                } catch (error) {
                    console.error("Грешка при запис:", error);
                    showToast("Грешка при запазване!");
                }
            };

            const updateDataField = (field, value) => {
                const newData = { ...data, [field]: value };
                saveData(newData);
            };

            // Helpers
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // --- 2. ЛОГИКА ЗА ГЕНЕРИРАНЕ НА РАЗПИСАНИЕ ---
            const generateSchedule = () => {
                showToast("Генериране на разписание...");
                
                const currentTerm = term;
                const newSchedulesAll = JSON.parse(JSON.stringify(data.schedules));
                newSchedulesAll[currentTerm] = {}; // Зануляваме разписанието за избрания срок

                // Подреждане на класовете по приоритет (по-малките са с предимство)
                // Пример: ПГ, I, II, III...
                const sortedClasses = [...data.classes].sort((a, b) => {
                    const isSmallA = /ПГ|I$|I |1|2|3/.test(a) ? -1 : 1;
                    const isSmallB = /ПГ|I$|I |1|2|3/.test(b) ? -1 : 1;
                    return isSmallA - isSmallB;
                });

                // Функция за проверка дали учителят е зает в даден ден и час
                const isTeacherBusy = (day, hour, tId) => {
                    for (let cls in newSchedulesAll[currentTerm]) {
                        if (newSchedulesAll[currentTerm][cls][day] && 
                            newSchedulesAll[currentTerm][cls][day][hour] && 
                            newSchedulesAll[currentTerm][cls][day][hour].tId === tId) {
                            return true;
                        }
                    }
                    return false;
                };

                // Разпределяне клас по клас
                sortedClasses.forEach(cls => {
                    newSchedulesAll[currentTerm][cls] = { 0:{}, 1:{}, 2:{}, 3:{}, 4:{} };
                    const plan = data.curriculum[currentTerm][cls] || [];
                    
                    let tasks = []; // Всички единични часове за класа
                    plan.forEach(item => {
                        for(let i=0; i<item.hours; i++) {
                            tasks.push({ sub: item.sub, tId: item.tId });
                        }
                    });

                    // Разбъркваме леко задачите за по-равномерно разпределение
                    tasks.sort(() => Math.random() - 0.5);

                    tasks.forEach(task => {
                        let placed = false;
                        
                        // ПРИОРИТЕТ 1: Опит за поставяне от 1-ви до 5-ти час
                        for(let h=1; h<=5; h++) {
                            for(let d=0; d<5; d++) { // Понеделник до Петък
                                if (!newSchedulesAll[currentTerm][cls][d][h] && !isTeacherBusy(d, h, task.tId)) {
                                    newSchedulesAll[currentTerm][cls][d][h] = task;
                                    placed = true;
                                    break;
                                }
                            }
                            if(placed) break;
                        }

                        // ПРИОРИТЕТ 2: Ако няма място, слагаме 6-ти или 7-ми час
                        if (!placed) {
                            for(let h=6; h<=7; h++) {
                                for(let d=0; d<5; d++) {
                                    if (!newSchedulesAll[currentTerm][cls][d][h] && !isTeacherBusy(d, h, task.tId)) {
                                        newSchedulesAll[currentTerm][cls][d][h] = task;
                                        placed = true;
                                        break;
                                    }
                                }
                                if(placed) break;
                            }
                        }

                        if (!placed) {
                            console.log(`Неуспешно разпределяне: ${task.sub} за ${cls}`);
                        }
                    });
                });

                updateDataField('schedules', newSchedulesAll);
                showToast("Разписанието е генерирано успешно!");
            };

            // --- 3. ЕКСПОРТ ФУНКЦИИ ---
            const exportExcel = () => {
                if (!selectedClass || !data.schedules[term][selectedClass]) return showToast("Няма данни за експорт!");
                
                const sched = data.schedules[term][selectedClass];
                const days = ['Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък'];
                const exportData = [];

                for(let h=1; h<=7; h++) {
                    let row = { "Час": `${h}` };
                    for(let d=0; d<5; d++) {
                        const cell = sched[d]?.[h];
                        if (cell) {
                            const teacher = data.teachers.find(t => t.id === cell.tId)?.name || '';
                            row[days[d]] = `${cell.sub} (${teacher})`;
                        } else {
                            row[days[d]] = "-";
                        }
                    }
                    exportData.push(row);
                }

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Разписание");
                XLSX.writeFile(workbook, `Razpisanie_${selectedClass}_Srok${term}.xlsx`);
            };

            const exportWord = () => {
                const headerHtml = `
                    <h2 style="text-align:center; font-family: sans-serif;">ЦСОП "Леда Милева"</h2>
                    <h3 style="text-align:center; font-family: sans-serif;">Седмично разписание - ${selectedClass} (Срок ${term})</h3>
                `;
                const tableHtml = document.getElementById('schedule-table-print').outerHTML;
                const fullHtml = `<html><body>${headerHtml}${tableHtml}</body></html>`;
                
                const blob = new Blob(['\ufeff', fullHtml], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Razpisanie_${selectedClass}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- UI РЕНДЕРИРАНЕ ---
            if (!ready) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="font-bold text-slate-600 uppercase tracking-widest text-sm">Зареждане на базата данни...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Тоуст съобщения */}
                    {toastMessage && (
                        <div className="fixed top-5 right-5 bg-indigo-600 text-white px-6 py-3 rounded-lg shadow-2xl z-50 font-bold transition-all">
                            {toastMessage}
                        </div>
                    )}

                    {/* Хедър */}
                    <header className="bg-slate-900 text-white shadow-xl no-print sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-indigo-500 rounded-xl flex items-center justify-center text-2xl font-black shadow-lg shadow-indigo-500/30">Ц</div>
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tight">ЦСОП "Леда Милева"</h1>
                                    <p className="text-xs text-indigo-300 font-bold uppercase tracking-widest">Учебна 2025/2026 година • {term} СРОК</p>
                                </div>
                            </div>

                            <div className="flex bg-slate-800 p-1.5 rounded-xl gap-1 overflow-x-auto max-w-full">
                                <button onClick={() => setActiveTab('curriculum')} className={`px-5 py-2 rounded-lg text-xs font-black uppercase transition-all whitespace-nowrap ${activeTab === 'curriculum' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>Учебен План</button>
                                <button onClick={() => setActiveTab('schedule')} className={`px-5 py-2 rounded-lg text-xs font-black uppercase transition-all whitespace-nowrap ${activeTab === 'schedule' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>Разписание</button>
                                <button onClick={() => setActiveTab('database')} className={`px-5 py-2 rounded-lg text-xs font-black uppercase transition-all whitespace-nowrap ${activeTab === 'database' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>База Данни</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-6 pb-20">
                        
                        {/* ТАБ: УЧЕБЕН ПЛАН */}
                        {activeTab === 'curriculum' && (
                            <div className="max-w-5xl mx-auto space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex flex-wrap justify-between items-center mb-6 border-b pb-4 gap-4">
                                        <h2 className="text-lg font-black uppercase text-slate-800 flex items-center gap-2">
                                            <span className="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center">📚</span>
                                            Съставяне на Учебен План
                                        </h2>
                                        
                                        <div className="flex items-center gap-3">
                                            {term === '2' && (
                                                <button 
                                                    onClick={() => {
                                                        if(confirm("Сигурни ли сте? Това ще презапише текущия план за 2-ри срок с този от 1-ви!")) {
                                                            const newCur = JSON.parse(JSON.stringify(data.curriculum));
                                                            newCur['2'] = JSON.parse(JSON.stringify(newCur['1'] || {}));
                                                            updateDataField('curriculum', newCur);
                                                            showToast("Планът е копиран успешно!");
                                                        }
                                                    }}
                                                    className="bg-amber-100 text-amber-700 px-4 py-2 rounded-lg text-xs font-bold uppercase hover:bg-amber-200 transition-colors">
                                                    Копирай от I Срок
                                                </button>
                                            )}
                                            <select value={term} onChange={e => setTerm(e.target.value)} className="bg-slate-100 text-slate-700 font-black text-sm px-4 py-2 rounded-lg outline-none border-2 border-transparent focus:border-indigo-500">
                                                <option value="1">I СРОК</option>
                                                <option value="2">II СРОК</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Паралелка</label>
                                            <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                <option value="">-- Избери --</option>
                                                {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Предмет</label>
                                            <select value={curForm.sub} onChange={e => setCurForm({...curForm, sub: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                <option value="">-- Избери --</option>
                                                {data.subjects.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Преподавател</label>
                                            <select value={curForm.tId} onChange={e => setCurForm({...curForm, tId: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                <option value="">-- Избери --</option>
                                                {data.teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Часове/Седмица</label>
                                            <div className="flex gap-2">
                                                <button onClick={() => setCurForm({...curForm, hours: Math.max(1, curForm.hours-1)})} className="w-12 bg-slate-200 rounded-xl font-black hover:bg-slate-300">-</button>
                                                <input readOnly value={curForm.hours} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-black text-center outline-none" />
                                                <button onClick={() => setCurForm({...curForm, hours: curForm.hours+1})} className="w-12 bg-slate-200 rounded-xl font-black hover:bg-slate-300">+</button>
                                            </div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => {
                                            if(!selectedClass || !curForm.tId || !curForm.sub) return showToast("Моля, попълнете всички полета!");
                                            const newCur = JSON.parse(JSON.stringify(data.curriculum));
                                            if(!newCur[term][selectedClass]) newCur[term][selectedClass] = [];
                                            newCur[term][selectedClass].push({...curForm, id: Date.now().toString()});
                                            updateDataField('curriculum', newCur);
                                            setCurForm({ tId: '', sub: '', hours: 1 }); // Изчистване
                                            showToast("Добавено към плана!");
                                        }}
                                        className="w-full bg-indigo-600 text-white p-4 rounded-xl font-black uppercase text-sm hover:bg-indigo-700 transition-colors">
                                        Добави към плана
                                    </button>
                                </div>

                                {/* Списък с текущия план */}
                                {selectedClass && (
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <h3 className="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">Текущ план: {selectedClass} ({term} Срок)</h3>
                                        {(!data.curriculum[term][selectedClass] || data.curriculum[term][selectedClass].length === 0) ? (
                                            <p className="text-slate-400 font-medium text-center py-8">Няма въведени часове за тази паралелка.</p>
                                        ) : (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                {data.curriculum[term][selectedClass].map((item, idx) => {
                                                    const teacher = data.teachers.find(t => t.id === item.tId);
                                                    return (
                                                        <div key={item.id} className="flex justify-between items-center bg-slate-50 border border-slate-100 p-3 rounded-xl">
                                                            <div className="flex items-center gap-3">
                                                                <div className="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-lg flex items-center justify-center font-black">{item.hours}</div>
                                                                <div>
                                                                    <p className="font-bold text-slate-800 text-sm leading-tight">{item.sub}</p>
                                                                    <p className="text-xs text-slate-500">{teacher ? teacher.name : 'Неизвестен'}</p>
                                                                </div>
                                                            </div>
                                                            <button 
                                                                onClick={() => {
                                                                    const newCur = JSON.parse(JSON.stringify(data.curriculum));
                                                                    newCur[term][selectedClass].splice(idx, 1);
                                                                    updateDataField('curriculum', newCur);
                                                                }}
                                                                className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg transition-colors">
                                                                Изтрий
                                                            </button>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ТАБ: РАЗПИСАНИЕ */}
                        {activeTab === 'schedule' && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 no-print">
                                    <div className="flex flex-col md:flex-row gap-4 justify-between items-end">
                                        <div className="flex gap-4 w-full md:w-auto">
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Срок</label>
                                                <select value={term} onChange={e => setTerm(e.target.value)} className="bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                    <option value="1">I СРОК</option>
                                                    <option value="2">II СРОК</option>
                                                </select>
                                            </div>
                                            <div className="flex-1 min-w-[150px]">
                                                <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Преглед на Клас</label>
                                                <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                    <option value="">-- Избери --</option>
                                                    {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-2 w-full md:w-auto mt-4 md:mt-0">
                                            <button onClick={generateSchedule} className="flex-1 md:flex-none bg-indigo-600 text-white px-6 py-3 rounded-xl font-black uppercase text-sm shadow-md hover:bg-indigo-700">Генерирай Всички</button>
                                            {selectedClass && (
                                                <>
                                                    <button onClick={exportExcel} className="bg-green-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-green-700" title="Експорт към Excel">XLS</button>
                                                    <button onClick={exportWord} className="bg-blue-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-blue-700" title="Експорт към Word">DOC</button>
                                                    <button onClick={() => window.print()} className="bg-slate-800 text-white px-4 py-3 rounded-xl font-bold hover:bg-slate-900" title="Печат / PDF">PDF</button>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {selectedClass ? (
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden print-container">
                                        <div className="p-6 md:p-8 text-center border-b border-slate-100">
                                            <h2 className="text-3xl font-black text-slate-800 uppercase tracking-tight">{selectedClass} клас</h2>
                                            <p className="text-sm font-bold text-indigo-500 uppercase tracking-widest mt-2">Седмично Разписание • {term} Срок</p>
                                        </div>
                                        <div className="overflow-x-auto p-4 md:p-6" id="schedule-table-container">
                                            <table className="w-full min-w-[800px] border-collapse" id="schedule-table-print">
                                                <thead>
                                                    <tr>
                                                        <th className="p-3 border-b-2 border-slate-200 text-xs font-black text-slate-400 uppercase w-16">Час</th>
                                                        {['Понеделник', 'Вторник', 'Сряда', 'Четвъртък', 'Петък'].map(d => (
                                                            <th key={d} className="p-3 border-b-2 border-slate-200 text-sm font-black text-slate-700 uppercase w-1/5">{d}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {[1,2,3,4,5,6,7].map(hour => {
                                                        // Проверка дали целият ред е празен (за да не се показва 7-ми час ако няма нищо)
                                                        const isRowEmpty = [0,1,2,3,4].every(d => !data.schedules[term]?.[selectedClass]?.[d]?.[hour]);
                                                        // Ако часът е > 5 и редът е празен, може да го скрием. Но за прегледност ще го оставим.

                                                        return (
                                                            <tr key={hour} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                                <td className="p-4 text-center font-black text-slate-300 text-2xl">{hour}</td>
                                                                {[0,1,2,3,4].map(dayIdx => {
                                                                    const cell = data.schedules[term]?.[selectedClass]?.[dayIdx]?.[hour];
                                                                    const teacher = cell ? data.teachers.find(t => t.id === cell.tId) : null;
                                                                    return (
                                                                        <td key={dayIdx} className="p-2 align-top">
                                                                            {cell ? (
                                                                                <div className={`p-3 rounded-xl border ${hour > 5 ? 'bg-orange-50 border-orange-200' : 'bg-white border-indigo-100 shadow-sm'} h-full flex flex-col justify-center`}>
                                                                                    <p className="text-slate-800 font-bold text-xs uppercase leading-tight">{cell.sub}</p>
                                                                                    <p className="text-indigo-500 font-medium text-[10px] mt-1">{teacher?.name}</p>
                                                                                </div>
                                                                            ) : (
                                                                                <div className="h-full min-h-[60px] rounded-xl border border-dashed border-slate-200 bg-slate-50/50"></div>
                                                                            )}
                                                                        </td>
                                                                    )
                                                                })}
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-200 text-center text-slate-400 font-medium">
                                        Изберете паралелка за преглед на разписанието
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ТАБ: БАЗА ДАННИ */}
                        {activeTab === 'database' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                
                                {/* Класове */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-black text-slate-800 uppercase mb-4 flex items-center gap-2">
                                        <span className="text-indigo-500">🏫</span> Паралелки
                                    </h3>
                                    <div className="flex gap-2 mb-4">
                                        <input value={newClass} onChange={e=>setNewClass(e.target.value)} placeholder="Напр. V" className="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none" />
                                        <button onClick={() => {
                                            if(newClass && !data.classes.includes(newClass)) {
                                                updateDataField('classes', [...data.classes, newClass]);
                                                setNewClass('');
                                            }
                                        }} className="bg-indigo-600 text-white px-4 rounded-xl font-black hover:bg-indigo-700">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto">
                                        {data.classes.map(c => (
                                            <div key={c} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <span className="font-bold text-slate-700">{c}</span>
                                                <button onClick={() => updateDataField('classes', data.classes.filter(x => x !== c))} className="text-red-400 hover:text-red-600 text-xs font-bold uppercase">Изтрий</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Учители */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-black text-slate-800 uppercase mb-4 flex items-center gap-2">
                                        <span className="text-indigo-500">👩‍🏫</span> Преподаватели
                                    </h3>
                                    <div className="flex gap-2 mb-4">
                                        <input value={newTeacher} onChange={e=>setNewTeacher(e.target.value)} placeholder="Име Фамилия" className="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none" />
                                        <button onClick={() => {
                                            if(newTeacher) {
                                                updateDataField('teachers', [...data.teachers, { id: Date.now().toString(), name: newTeacher }]);
                                                setNewTeacher('');
                                            }
                                        }} className="bg-indigo-600 text-white px-4 rounded-xl font-black hover:bg-indigo-700">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto">
                                        {data.teachers.map(t => (
                                            <div key={t.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <span className="font-bold text-slate-700 text-sm">{t.name}</span>
                                                <button onClick={() => updateDataField('teachers', data.teachers.filter(x => x.id !== t.id))} className="text-red-400 hover:text-red-600 text-xs font-bold uppercase">Изтрий</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Предмети */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="font-black text-slate-800 uppercase mb-4 flex items-center gap-2">
                                        <span className="text-indigo-500">📖</span> Предмети
                                    </h3>
                                    <div className="flex gap-2 mb-4">
                                        <input value={newSubject} onChange={e=>setNewSubject(e.target.value)} placeholder="Напр. БЕЛ" className="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none" />
                                        <button onClick={() => {
                                            if(newSubject && !data.subjects.includes(newSubject)) {
                                                updateDataField('subjects', [...data.subjects, newSubject]);
                                                setNewSubject('');
                                            }
                                        }} className="bg-indigo-600 text-white px-4 rounded-xl font-black hover:bg-indigo-700">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto">
                                        {data.subjects.map(s => (
                                            <div key={s} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <span className="font-bold text-slate-700 text-sm">{s}</span>
                                                <button onClick={() => updateDataField('subjects', data.subjects.filter(x => x !== s))} className="text-red-400 hover:text-red-600 text-xs font-bold uppercase">Изтрий</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Допълнителни условия */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2 lg:col-span-3">
                                    <h3 className="font-black text-slate-800 uppercase mb-4 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <span className="text-indigo-500">⚙️</span> Допълнителни условия
                                        </div>
                                        <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-wider">AI Integration / Notes</span>
                                    </h3>
                                    <textarea 
                                        value={data.customConditions}
                                        onChange={e => updateDataField('customConditions', e.target.value)}
                                        placeholder="Въведете изисквания (напр. 'Учител Х да няма час в понеделник сутрин', 'Класове от ПГ да нямат 6-ти час' и др.)..."
                                        className="w-full h-32 bg-slate-50 p-4 rounded-xl border border-slate-200 font-medium text-sm text-slate-700 outline-none focus:border-indigo-500 resize-none"
                                    ></textarea>
                                </div>

                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

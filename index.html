                                        <button onClick={() => {
                                            if(newSubject) {
                                                if(!currentSubjects.some(s => s.toLowerCase() === newSubject.toLowerCase())) {
                                                    updateYearlyDataField('subjects', [...currentSubjects, newSubject]);
                                                    setNewSubject('');
                                                } else { showToast("Този предмет вече съществува!"); }
                                            }
                                        }} className="bg-indigo-600 text-white px-4 rounded-xl font-black hover:bg-indigo-700">+</button>
                                    </div>
                                    <div className="space-y-2 overflow-y-auto custom-scrollbar pr-1 pb-4">
                                        {currentSubjects.map(s => (
                                            <div key={s} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100 group hover:border-indigo-100 transition-colors">
                                                <span className="font-bold text-slate-700 text-sm truncate pr-2" title={s}>{s}</span>
                                                <div className="flex gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    {/* Бутон за разпределяне към класове */}
                                                    <button onClick={() => setAssignSubModal({isOpen: true, subject: s, selectedClasses: []})} className="text-emerald-500 hover:text-emerald-700 bg-white border border-slate-200 px-2 py-1 rounded shadow-sm text-[10px] font-black uppercase" title="Добави към паралелки">➕</button>
                                                    <button onClick={() => updateYearlyDataField('subjects', currentSubjects.filter(x => x !== s))} className="text-red-400 hover:text-red-600 bg-white border border-slate-200 px-2 py-1 rounded shadow-sm text-[10px] font-black uppercase">✖</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ТАБ 4: УСЛОВИЯ */}
                        {activeTab === 'conditions' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="mb-6 border-b pb-4">
                                        <h2 className="text-lg font-black uppercase text-slate-800 flex items-center gap-2">
                                            <span className="w-8 h-8 rounded-lg bg-orange-100 text-orange-600 flex items-center justify-center">🚫</span>
                                            Забрани и Ограничения за Учители
                                        </h2>
                                        <p className="text-sm text-slate-500 mt-2 font-medium">Тук можете да зададете условия кога даден преподавател <b>НЕ МОЖЕ</b> да има часове.</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                                        <div className="md:col-span-2">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Преподавател</label>
                                            <select value={condForm.tId} onChange={e => setCondForm({...condForm, tId: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                <option value="">-- Изберете учител --</option>
                                                {currentTeachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Ден</label>
                                            <select value={condForm.day} onChange={e => setCondForm({...condForm, day: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                {DAYS_BG.map((d, index) => <option key={index} value={index}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Забранен Час</label>
                                            <select value={condForm.hour} onChange={e => setCondForm({...condForm, hour: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                                <option value="all">Всички (Целият ден)</option>
                                                {[1,2,3,4,5,6].map(h => <option key={h} value={h}>{h}-ви час</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => {
                                            if(!condForm.tId) return setSystemModal({isOpen: true, type: 'error', title: 'Грешка', message: 'Изберете преподавател!'});
                                            const newCond = { id: `cond_${Date.now()}`, tId: condForm.tId, day: condForm.day, hour: condForm.hour };
                                            if(currentConditions.some(c => c.tId === newCond.tId && c.day === newCond.day && c.hour === newCond.hour)) {
                                                return showToast("Това условие вече е добавено!");
                                            }
                                            updateYearlyDataField('conditions', [...currentConditions, newCond]);
                                            showToast("Условието е запазено!");
                                        }}
                                        className="w-full bg-orange-500 text-white p-4 rounded-xl font-black uppercase text-sm hover:bg-orange-600 transition-colors shadow-sm">
                                        Добави Ограничение
                                    </button>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-sm font-black text-slate-500 uppercase tracking-widest mb-4">Активни Условия</h3>
                                    {(!currentConditions || currentConditions.length === 0) ? (
                                        <p className="text-slate-400 font-medium text-center py-8">Няма въведени ограничения за учителите.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {currentConditions.map(cond => {
                                                const teacher = currentTeachers.find(t => t.id === cond.tId);
                                                return (
                                                    <div key={cond.id} className="flex justify-between items-center bg-orange-50/50 border border-orange-100 p-4 rounded-xl">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 bg-white border border-orange-200 text-orange-600 rounded-lg flex items-center justify-center font-black">🚫</div>
                                                            <div>
                                                                <p className="font-bold text-slate-800 text-sm leading-tight">{teacher ? teacher.name : 'Неизвестен'}</p>
                                                                <p className="text-xs text-orange-600 font-semibold mt-1">
                                                                    Забранено за: {DAYS_BG[cond.day]}, {cond.hour === 'all' ? 'Целият ден' : `${cond.hour}-ви час`}
                                                                </p>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => updateYearlyDataField('conditions', currentConditions.filter(c => c.id !== cond.id))} className="text-slate-400 hover:text-red-500 font-bold uppercase text-xs transition-colors">Премахни</button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* МОДАЛ ЗА РЪЧНА РЕДАКЦИЯ НА КЛЕТКА */}
                    {manualEditModal.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
                                <div className="mb-6">
                                    <h3 className="text-lg font-black text-slate-800 uppercase">Ръчна редакция</h3>
                                    <p className="text-xs font-bold text-indigo-500 uppercase mt-1">Клас {manualEditModal.cls} • {DAYS_BG[manualEditModal.day]}, {manualEditModal.hour}-ви час</p>
                                </div>
                                <div className="space-y-4 mb-8">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Предмет</label>
                                        <select value={manualEditModal.sub} onChange={e => setManualEditModal({...manualEditModal, sub: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                            <option value="">-- Изчисти (Свободен час) --</option>{currentSubjects.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase mb-1 block">Преподавател</label>
                                        <select value={manualEditModal.tId} onChange={e => setManualEditModal({...manualEditModal, tId: e.target.value})} className="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 font-bold outline-none focus:border-indigo-500">
                                            <option value="">-- Без учител --</option>{currentTeachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={saveManualEdit} className="flex-1 bg-indigo-600 text-white p-3 rounded-xl font-black uppercase text-xs hover:bg-indigo-700">Запази</button>
                                    <button onClick={() => setManualEditModal({ isOpen: false, cls: '', day: 0, hour: 0, sub: '', tId: '' })} className="bg-slate-200 text-slate-700 px-5 rounded-xl font-bold uppercase text-xs hover:bg-slate-300">Отказ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ФУТЕР */}
                    <footer className="bg-slate-900 text-slate-400 py-6 text-center text-xs font-medium no-print mt-auto">
                        <div className="max-w-7xl mx-auto px-6">&copy; {new Date().getFullYear()} Всички права запазени - ЦСОП "Леда Милева", гр. Долни Дъбник</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

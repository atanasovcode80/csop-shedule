<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦСОП "Леда Милева" - Система за Разписания</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8faff; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        window.FB_SDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('schedule');
            const [term, setTerm] = useState('1');
            const [selectedClass, setSelectedClass] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [data, setData] = useState({ teachers: [], subjects: [], classes: [], curriculum: { '1': {}, '2': {} }, schedules: { '1': {}, '2': {} } });

            useEffect(() => {
                const init = async () => {
                    if (!window.FB_SDK) return setTimeout(init, 200);
                    
                    try {
                        // Проверка за налична конфигурация
                        const config = window.__firebase_config ? JSON.parse(window.__firebase_config) : null;
                        if (!config) {
                            console.warn("Firebase config missing - using local mode");
                            setReady(true);
                            return;
                        }

                        const app = window.FB_SDK.initializeApp(config);
                        const auth = window.FB_SDK.getAuth(app);

                        if (window.__initial_auth_token) {
                            await window.FB_SDK.signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await window.FB_SDK.signInAnonymously(auth);
                        }

                        window.FB_SDK.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setReady(true);
                        });
                    } catch (err) {
                        console.error("Init error:", err);
                        setReady(true); // Позволява работа дори при грешка в облака
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !window.FB_SDK) return;
                const db = window.FB_SDK.getFirestore();
                const appId = window.__app_id || 'csop-leda-mileva-v1';
                const docRef = window.FB_SDK.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'master_config');

                return window.FB_SDK.onSnapshot(docRef, (snap) => {
                    if (snap.exists()) setData(prev => ({ ...prev, ...snap.data() }));
                });
            }, [user]);

            const save = async (newData) => {
                if (!user) return;
                setIsSyncing(true);
                try {
                    const db = window.FB_SDK.getFirestore();
                    const appId = window.__app_id || 'csop-leda-mileva-v1';
                    await window.FB_SDK.setDoc(window.FB_SDK.doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'master_config'), newData);
                } finally { setIsSyncing(false); }
            };

            // Помощна функция за актуализация
            const update = (fields) => {
                const newData = { ...data, ...fields };
                setData(newData);
                save(newData);
            };

            if (!ready) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse uppercase tracking-[0.2em]">Свързване...</div>;

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-50 no-print">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">Ц</div>
                            <h1 className="text-xs font-black text-slate-800 uppercase">ЦСОП "Леда Милева"</h1>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            {['schedule', 'curriculum', 'database'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>
                                    {t === 'schedule' ? 'График' : t === 'curriculum' ? 'План' : 'База'}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-orange-400 animate-ping' : 'bg-green-500'}`}></div>
                            <select value={term} onChange={e => setTerm(e.target.value)} className="bg-indigo-50 text-indigo-700 font-black text-[10px] px-3 py-1.5 rounded-lg outline-none">
                                <option value="1">I СРОК</option>
                                <option value="2">II СРОК</option>
                            </select>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-6">
                        {activeTab === 'schedule' && (
                            <div className="space-y-6">
                                <div className="glass-card p-6 rounded-3xl flex gap-4 no-print items-end">
                                    <div className="flex-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase mb-2 block ml-1">Избор на паралелка</label>
                                        <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="w-full bg-slate-50 p-3 rounded-xl font-bold text-slate-800 outline-none border border-slate-100">
                                            <option value="">-- Изберете --</option>
                                            {data.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => window.print()} className="h-12 w-12 flex items-center justify-center bg-slate-800 text-white rounded-xl">🖨️</button>
                                </div>

                                {selectedClass ? (
                                    <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">
                                        <div className="p-8 text-center bg-indigo-50/30">
                                            <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tight">{selectedClass}</h2>
                                            <p className="text-[9px] font-bold text-indigo-500 uppercase mt-2">Седмично разписание</p>
                                        </div>
                                        <table className="w-full text-center border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="p-4 border-b text-[10px] font-black text-slate-300">№</th>
                                                    {['Пон', 'Втор', 'Сряда', 'Четв', 'Пет'].map(d => <th key={d} className="p-4 border-b text-[10px] font-black text-slate-600 uppercase">{d}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {[1,2,3,4,5,6,7].map(h => (
                                                    <tr key={h} className="border-b border-slate-50 last:border-0">
                                                        <td className="p-6 font-black text-slate-200 text-2xl">{h}</td>
                                                        {[0,1,2,3,4].map(di => {
                                                            const cell = data.schedules[term]?.[selectedClass]?.[di]?.[h];
                                                            const teacher = data.teachers.find(t => t.id === cell?.tId);
                                                            return (
                                                                <td key={di} className="p-2 min-w-[120px]">
                                                                    {cell && (
                                                                        <div className="bg-white border border-indigo-50 p-3 rounded-2xl shadow-sm">
                                                                            <p className="text-slate-800 font-black text-[10px] uppercase leading-tight">{cell.sub}</p>
                                                                            <p className="text-indigo-400 font-bold text-[7px] uppercase mt-2">{teacher?.name}</p>
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="py-20 text-center glass-card rounded-3xl border-2 border-dashed border-slate-200 text-slate-400 font-black uppercase text-xs">Изберете паралелка</div>
                                )}
                            </div>
                        )}

                        {activeTab === 'database' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="glass-card p-6 rounded-3xl">
                                    <h3 className="font-black text-indigo-600 text-[10px] uppercase mb-4">Учители</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input id="tIn" className="flex-1 bg-slate-50 p-3 rounded-xl text-xs font-bold outline-none" placeholder="Име..." />
                                        <button onClick={() => { 
                                            const val = document.getElementById('tIn').value;
                                            if(val) { update({ teachers: [...data.teachers, {id: Date.now().toString(), name: val}] }); document.getElementById('tIn').value = ''; }
                                        }} className="w-12 h-12 bg-indigo-600 text-white rounded-xl font-black">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                        {data.teachers.map(t => (
                                            <div key={t.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center group">
                                                <span className="text-xs font-bold">{t.name}</span>
                                                <button onClick={() => update({ teachers: data.teachers.filter(x => x.id !== t.id) })} className="text-slate-300 hover:text-red-500 font-black opacity-0 group-hover:opacity-100">×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-6 rounded-3xl">
                                    <h3 className="font-black text-indigo-600 text-[10px] uppercase mb-4">Паралелки</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input id="cIn" className="flex-1 bg-slate-50 p-3 rounded-xl text-xs font-bold outline-none" placeholder="Име..." />
                                        <button onClick={() => { 
                                            const val = document.getElementById('cIn').value;
                                            if(val) { update({ classes: [...data.classes, val] }); document.getElementById('cIn').value = ''; }
                                        }} className="w-12 h-12 bg-indigo-600 text-white rounded-xl font-black">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-2">
                                        {data.classes.map((c, i) => (
                                            <div key={i} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center group">
                                                <span className="text-xs font-bold">{c}</span>
                                                <button onClick={() => update({ classes: data.classes.filter((_, idx) => idx !== i) })} className="text-slate-300 hover:text-red-500 font-black opacity-0 group-hover:opacity-100">×</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
